<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baobab Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-inter min-h-screen flex-col">

  <!-- HEADER HAUT -->
  <header id="topBar" class="w-full flex items-center justify-end px-6 py-4 text-sm">
    <div class="flex items-center gap-3">
      <button onclick="showPage('settingsPage')" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,6c0,1.1 0.9,2 2,2s2,-0.9 2,-2 -0.9,-2 -2,-2 -2,0.9 -2,2zM12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2z"/></svg>
      </button>
      <button onclick="showPage('settingsPage')" class="w-8 h-8 rounded-full bg-gradient-to-r from-blue-600 to-blue-900 text-white font-bold">B</button>
    </div>
  </header>

  <!-- HOME -->
  <main id="homePage" class="page active flex-1 flex-col items-center px-4">
    <div class="mt-16"></div>
    <h1 class="font-sora text-6xl font-bold mb-10 bg-gradient-to-r from-blue-600 to-blue-900 bg-clip-text text-transparent">Baobab</h1>
    <form onsubmit="search(event)" class="w-full max-w-2xl">
      <div class="flex items-center w-full h-12 px-4 border-gray-300 dark:border-gray-700 rounded-full hover:shadow-md bg-white dark:bg-gray-900">
        <svg class="w-5 h-5 text-gray-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="searchInput" type="text" placeholder="Recher sur Baobab..." class="bg-transparent outline-none w-full">
        <div class="flex items-center gap-3 ml-2">
          <button type="button" onclick="startVoice('micIcon')" title="Recherche vocale"><svg id="micIcon" class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Zm5 8c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2Z"/></svg></button>
          <button type="button" onclick="takePhoto()" title="Recherche par image"><svg class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 24 24"><path d="M9 2L7.17 4H4c-1.1 0-2.9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/><circle cx="12" cy="12" r="3.2"/></svg></button>
          <button type="button" onclick="uploadDocument()" title="Recherche par document"><svg class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2.9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg></button>
        </div>
      </div>
    </form>
    <div class="flex gap-3 mt-6">
      <button onclick="search(event)" class="px-4 py-2 bg-gray-100 dark:bg-gray-800 rounded hover:bg-gray-200">Rechercher</button>
      <button onclick="alert('Jai de la chance')" class="px-4 py-2 bg-gray-100 dark:bg-gray-800 rounded hover:bg-gray-200">J'ai de la chance</button>
    </div>
  </main>

  <!-- BARRE BAS -->
  <nav id="bottomBar" class="hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-900 border-t dark:border-gray-800 flex justify-around py-2 z-50">
    <button onclick="showPage('settingsPage')" class="p-2 rounded-full"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,6c0,1.1 0.9,2 2,2s2,-0.9 2,-2 -0.9,-2 -2,-2 -2,0.9 -2,2zM12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2z"/></svg></button>
    <button onclick="showPage('settingsPage')" class="w-8 h-8 rounded-full bg-gradient-to-r from-blue-600 to-blue-900 text-white font-bold">B</button>
  </nav>

  <!-- RESULTS -->
  <section id="resultsPage" class="page flex-1 pb-20">
    <div class="sticky top-0 bg-white dark:bg-gray-950 border-b dark:border-gray-800 px-4 lg:px-40 pt-3">
      <form onsubmit="search(event)" class="flex items-center w-full max-w-2xl h-11 px-4 border-gray-300 dark:border-gray-700 rounded-full mb-3 bg-white dark:bg-gray-900">
        <svg class="w-5 h-5 text-gray-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="searchInputResults" type="text" class="bg-transparent outline-none w-full">
        <div class="flex items-center gap-3 ml-2">
          <button type="button" onclick="startVoice('micIcon2')" title="Recherche vocale"><svg id="micIcon2" class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Zm5 8c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2Z"/></svg></button>
          <button type="button" onclick="takePhoto()" title="Recherche par image"><svg class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 24 24"><path d="M9 2L7.17 4H4c-1.1 0-2.9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/><circle cx="12" cy="12" r="3.2"/></svg></button>
        </div>
      </form>
    </div>
    <div class="px-4 lg:px-40 py-4">
      <p id="resultCount" class="text-sm text-gray-500 mb-4"></p>
      <div id="resultsList" class="space-y-6"></div>
    </div>
  </section>

  <!-- PARAMETRES -->
  <section id="settingsPage" class="page flex-1 px-4 lg:px-40 py-10 pb-24">
    <h2 id="set_title" class="text-3xl font-bold mb-8 font-sora">Paramètres</h2>
    <!-- Les 4 sections que tu as donné -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 mb-4 shadow-sm border dark:border-gray-800">
      <h3 id="set_account_title" class="font-semibold text-lg mb-4">1. Compte et Synchronisation</h3>
      <button onclick="openAccount()" class="flex justify-between items-center w-full py-3 border-b dark:border-gray-800"><span id="set_account_info">Gestion du Compte</span> <span>></span></button>
      <button onclick="openSync()" class="flex justify-between items-center w-full py-3 border-b dark:border-gray-800"><span id="set_sync">Synchronisation</span> <span>></span></button>
      <button onclick="openDevices()" class="flex justify-between items-center w-full py-3"><span id="set_devices">Gestion des appareils</span> <span>></span></button>
    </div>
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 mb-4 shadow-sm border dark:border-gray-800">
      <h3 id="set_lang_title" class="font-semibold text-lg mb-4">2. Langues et Région</h3>
      <label class="flex flex-col gap-2 py-3"><span id="set_lang_display">Langue d'affichage</span><select id="uiLanguage" class="w-full bg-gray-100 dark:bg-gray-800 p-2 rounded-lg"><option value="fr">Français</option><option value="en">English</option><option value="ar">العربية</option><option value="wo">Wolof</option></select></label>
      <label class="flex flex-col gap-2 py-3"><span id="set_region">Région et Fuseau horaire</span><select id="region" class="w-full bg-gray-100 dark:bg-gray-800 p-2 rounded-lg"><option value="sn">Sénégal GMT+0</option><option value="fr">France GMT+1</option><option value="us">USA GMT-5</option></select></label>
    </div>
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 mb-4 shadow-sm border dark:border-gray-800">
      <h3 id="set_security_title" class="font-semibold text-lg mb-4">3. Sécurité et Confidentialité</h3>
      <label class="flex items-center justify-between py-3"><span id="set_2fa">Validation en deux étapes 2FA</span><input type="checkbox" id="twoFA" class="w-5 h-5 accent-blue-600"></label>
      <button onclick="openPermissions()" class="flex justify-between items-center w-full py-3 border-b dark:border-gray-800"><span id="set_perms">Autorisations</span> <span>></span></button>
      <button onclick="openActivity()" class="flex justify-between items-center w-full py-3"><span id="set_activity">Activité et Historique</span> <span>></span></button>
    </div>
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 mb-4 shadow-sm border dark:border-gray-800">
      <h3 id="set_pref_title" class="font-semibold text-lg mb-4">4. Préférences d'Utilisation</h3>
      <button onclick="openAccessibility()" class="flex justify-between items-center w-full py-3 border-b dark:border-gray-800"><span id="set_access">Accessibilité</span> <span>></span></button>
      <label class="flex flex-col gap-2 py-3"><span id="set_theme">Thème</span><select id="theme" class="w-full bg-gray-100 dark:bg-gray-800 p-2 rounded-lg"><option value="light">Clair</option><option value="dark">Sombre</option><option value="system">Système</option></select></label>
      <label class="flex flex-col gap-2 py-3"><span id="set_bar">Position de la barre</span><select id="barPosition" class="w-full bg-gray-100 dark:bg-gray-800 p-2 rounded-lg"><option value="top">En Haut</option><option value="bottom">En Bas</option></select></label>
    </div>
    <button onclick="saveSettings()" id="set_save_btn" class="bg-gradient-to-r from-blue-600 to-blue-700 text-white w-full py-3.5 rounded-full font-bold">Enregistrer</button>
    <p id="saveMsg" class="text-green-600 text-center mt-3 hidden">✓ Paramètres enregistrés!</p>
    <button onclick="showPage('homePage')" id="set_back_btn" class="mt-6 text-blue-600 w-full font-semibold">← Retour à l'accueil</button>
  </section>

  <footer class="bg-gray-100 dark:bg-gray-900 text-sm text-gray-600 dark:text-gray-400">
    <div class="px-6 py-3 border-b dark:border-gray-800">Guédiawaye, SN</div>
  </footer>

  <input type="file" id="fileInput" class="hidden">
  <script src="script.js"></script>
</body>
  </html>
