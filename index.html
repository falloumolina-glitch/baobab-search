<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baobab Search</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header class="top-nav">
    <div></div>
    <div class="right-icons">
      <svg class="icon-grid" viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z" fill="#5F6368"/></svg>
      <div class="avatar">B</div>
    </div>
  </header>

  <!-- ACCUEIL -->
  <main id="home" class="page active">
    <div class="home-center">
      <h1 class="logo-text">Baobab</h1>
      
      <!-- BARRE DE RECHERCHE -->
      <div class="search-bar" id="searchBar">
        <input id="searchInput" type="text" placeholder="Recher sur Baobab..." onfocus="showSuggestions()">
        
        <!-- MICRO SVG -->
        <svg class="icon-btn" onclick="alert('Recherche vocale bientôt')" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>

        <!-- APPAREIL PHOTO SVG -->
        <svg class="icon-btn" onclick="alert('Recherche visuelle bientôt')" viewBox="0 0 24 24"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>

        <!-- BOUTON LOUPE BLEU -->
        <button class="search-btn-icon" onclick="search()">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="white"/></svg>
        </button>
      </div>

      <!-- BOUTON RECHER EN DESSOUS -->
      <button class="main-search-btn" onclick="search()">Recher</button>

      <!-- SUGGESTIONS -->
      <div id="suggestions" class="suggestions hidden">
        <div class="item">baobab dakar</div>
        <div class="item">météo louga</div>
        <div class="item">baobab fruit bienfaits</div>
      </div>
    </div>

    <footer>
      <span>Guédiawaye, SN</span>
      <div>
        <a href="#">À propos</a>
        <a href="#">Confidentialité</a>
      </div>
    </footer>
  </main>

  <!-- RESULTATS -->
  <main id="results" class="page">
    <header class="results-header">
      <h1 class="logo-text-small">Baobab</h1>
      <div class="search-bar small">
        <input id="searchInput2" type="text">
        <button class="search-btn-icon" onclick="search()"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="white"/></svg></button>
      </div>
    </header>
    <div class="filter-bar">
      <button class="active">Tous</button><button>Images</button><button>Photos</button><button>Vidéos</button><button>Actualités</button><button>Documents</button><button>Maps</button>
    </div>
    <div id="resultsList" class="results"></div>
  </main>

<script src="script.js"></script>
</body>
          </html>
