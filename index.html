<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baobab Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white font-sans">

  <!-- TOP BAR -->
  <div id="topBar" class="sticky top-0 z-50 bg-white dark:bg-gray-800 shadow p-3 flex items-center gap-2">
    <button onclick="showPage('homePage')" class="font-bold text-xl text-orange-500">Baobab</button>
    <input id="searchInputResults" type="text" class="flex-1 border rounded-full px-4 py-2 dark:bg-gray-700" placeholder="Recher...">
    <button onclick="search()">🔍</button>
  </div>

  <!-- HOME PAGE -->
  <div id="homePage" class="page active p-4">
    <div class="text-center mt-10">
      <h1 class="text-5xl font-bold text-orange-500">Baobab</h1>
      <form onsubmit="search(event)" class="mt-6 max-w-2xl mx-auto">
        <div class="relative">
          <input id="searchInput" type="text" class="w-full border-2 rounded-full px-5 py-3 pr-20 dark:bg-gray-700" placeholder="Recher sur Baobab...">
          <button type="button" onclick="startVoice('voiceHome')" id="voiceHome" class="absolute right-12 top-3">🎤</button>
          <button type="button" onclick="takePhoto()" class="absolute right-3 top-3">📷</button>
          <input type="file" id="fileInput" class="hidden">
        </div>
        <button type="submit" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-full">Recher</button>
      </form>
      <button onclick="showPage('settingsPage')" class="mt-6 text-blue-600">Paramètres</button>
    </div>
  </div>

  <!-- RESULTS PAGE -->
  <div id="resultsPage" class="page p-4">
    <div class="flex gap-4 border-b mb-4">
      <button id="tab-all" onclick="switchTab('all')" class="tab-btn border-b-2 border-blue-600 text-blue-600 font-semibold pb-2">Tous</button>
      <button id="tab-images" onclick="switchTab('images')" class="tab-btn pb-2">Images</button>
      <button id="tab-videos" onclick="switchTab('videos')" class="tab-btn pb-2">Vidéos</button>
      <button id="tab-news" onclick="switchTab('news')" class="tab-btn pb-2">Actualités</button>
    </div>
    <p id="resultCount" class="text-sm text-gray-500 mb-4"></p>
    <div id="aiSummary" class="bg-blue-50 dark:bg-blue-900 p-3 rounded mb-4">
      <p class="font-semibold">✨ Résumé IA par Baobab</p>
      <p id="aiText"></p>
    </div>
    <div id="resultsList" class="space-y-4"></div>
  </div>

  <!-- SETTINGS PAGE -->
  <div id="settingsPage" class="page p-4 max-w-2xl mx-auto">
    <h2 id="set_title" class="text-2xl font-bold mb-4">Paramètres</h2>

    <div class="bg-white dark:bg-gray-800 p-4 rounded shadow mb-4">
      <h3 id="set_lang_title" class="font-semibold mb-2">1. Langue d'affichage</h3>
      <label class="block mb-2"><span id="set_lang_display">Langue d'affichage</span>
        <select id="uiLanguage" class="w-full border rounded p-2 dark:bg-gray-700 mt-1">
          <option value="fr">Français</option><option value="en">English</option><option value="es">Español</option>
          <option value="ru">Русский</option><option value="de">Deutsch</option><option value="it">Italiano</option>
          <option value="pt">Português</option><option value="pt-BR">Português Brasil</option><option value="nl">Nederlands</option>
          <option value="ar">العربية</option><option value="wo">Wolof</option>
        </select>
      </label>
      <label class="block mb-2"><span id="set_lang_results">Langue des résultats</span>
        <select id="resultsLanguage" class="w-full border rounded p-2 dark:bg-gray-700 mt-1">
          <option value="any">Toutes les langues</option><option value="fr">Français</option><option value="en">English</option>
          <option value="es">Español</option><option value="ru">Русский</option><option value="de">Deutsch</option>
          <option value="it">Italiano</option><option value="pt">Português</option><option value="ar">العربية</option>
        </select>
      </label>
      <label class="block"><span id="set_region">Région géographique</span>
        <select id="region" class="w-full border rounded p-2 dark:bg-gray-700 mt-1">
          <option value="world">Monde entier</option><option value="sn">Sénégal</option><option value="fr">France</option>
          <option value="us">États-Unis</option><option value="ma">Maroc</option><option value="dz">Algérie</option>
        </select>
      </label>
    </div>

    <div class="bg-white dark:bg-gray-800 p-4 rounded shadow mb-4">
      <h3 id="set_period_title" class="font-semibold mb-2">2. Période</h3>
      <label class="block mb-2"><span id="set_time">Période</span>
        <select id="timeFilter" class="w-full border rounded p-2 dark:bg-gray-700 mt-1">
          <option value="any">N'importe quand</option><option value="h">Dernière heure</option>
          <option value="d">Dernières 24h</option><option value="w">Dernière semaine</option>
          <option value="m">Dernier mois</option><option value="y">Dernière année</option>
        </select>
      </label>
      <label class="flex items-center gap-2">
        <input type="checkbox" id="verbatim">
        <span id="set_verbatim">Recherche exacte Verbatim</span>
      </label>
    </div>

    <div class="bg-white dark:bg-gray-800 p-4 rounded shadow mb-4">
      <h3 id="set_privacy_title" class="font-semibold mb-2">3. Confidentialité</h3>
      <label class="flex items-center gap-2 mb-2">
        <input type="checkbox" id="saveHistory">
        <span id="set_hist">Enregistrer l'historique Web</span>
      </label>
      <label class="flex items-center gap-2 mb-2">
        <input type="checkbox" id="personalization">
        <span id="set_pers">Personnalisation des résultats</span>
      </label>
      <label class="block"><span id="set_safe">Filtrage SafeSearch</span>
        <select id="safeSearch" class="w-full border rounded p-2 dark:bg-gray-700 mt-1">
          <option value="off">Désactivé</option><option value="moderate">Flou</option><option value="on">Activé</option>
        </select>
      </label>
    </div>

    <div class="bg-white dark:bg-gray-800 p-4 rounded shadow mb-4">
      <h3 id="set_ui_title" class="font-semibold mb-2">4. Interface</h3>
      <label class="block mb-2"><span id="set_bar">Position de la barre</span>
        <select id="barPosition" class="w-full border rounded p-2 dark:bg-gray-700 mt-1">
          <option value="top">Barre en Haut</option><option value="bottom">Barre en Bas</option>
        </select>
      </label>
      <label class="flex items-center gap-2 mb-2">
        <input type="checkbox" id="autocomplete">
        <span id="set_auto">Saisie semi-automatique</span>
      </label>
      <label class="flex items-center gap-2 mb-2">
        <input type="checkbox" id="openNewTab">
        <span id="set_tab">Ouvrir dans un nouvel onglet</span>
      </label>
      <label class="flex items-center gap-2 mb-2">
        <input type="checkbox" id="voiceSearch">
        <span id="set_voice">Recherche vocale</span>
      </label>
      <label class="block"><span id="set_theme">Thème</span>
        <select id="theme" class="w-full border rounded p-2 dark:bg-gray-700 mt-1">
          <option value="system">Système</option><option value="light">Thème Clair</option><option value="dark">Thème Sombre</option>
        </select>
      </label>
    </div>

    <div class="bg-white dark:bg-gray-800 p-4 rounded shadow mb-4">
      <h3 id="set_legal_title" class="font-semibold mb-2">5. Légal</h3>
      <button id="set_privacy_btn" class="text-blue-600 block mb-2">Politique de confidentialité</button>
      <button id="set_terms_btn" class="text-blue-600 block">Conditions d'utilisation</button>
    </div>

    <button onclick="saveSettings()" id="set_save_btn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-full font-semibold">Enregistrer</button>
    <p id="set_saved_msg" class="text-green-600 text-center mt-2 hidden">✓ Paramètres enregistrés!</p>
    <button onclick="showPage('homePage')" id="set_back_btn" class="w-full text-blue-600 mt-4">← Retour à l'accueil</button>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottomBar" class="hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 shadow p-2 flex justify-around">
    <button onclick="showPage('homePage')">🏠</button>
    <button onclick="startVoice('voiceBottom')" id="voiceBottom">🎤</button>
    <button onclick="showPage('settingsPage')">⚙️</button>
  </div>

  <script src="script.js"></script>
</body>
  </html>
