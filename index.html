<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baobab Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo-header" onclick="goHome()">BS</div>
    <nav>
      <a onclick="goHome()">Recherche</a>
      <a onclick="alert('À propos de Baobab')">À propos</a>
      <a onclick="showPage('settings')">⚙️ Paramètres</a>
    </nav>
  </header>

  <!-- ACCUEIL -->
  <main id="home" class="page active">
    <div class="center">
      <div class="logo-main">BS</div>
      <p class="slogan">Baobab Search — L'arbre de la connaissance</p>
      
      <form onsubmit="search(event)" class="search-form">
        <span>🔍</span>
        <input id="searchInput" type="text" placeholder="Recher sur Baobab...">
        <button type="submit">Q</button>
      </form>

      <div class="sub-links">
        <a onclick="quickSearch('web')">Recherche Web</a>
        <a onclick="quickSearch('images')">Images</a>
        <a onclick="quickSearch('vidéos')">Vidéos</a>
        <a onclick="quickSearch('actualités')">Actualités</a>
      </div>
    </div>

    <footer>
      <div>
        <a href="#">Confidentialité</a>
        <a href="#">Conditions d'utilisation</a>
        <a href="#">Contact</a>
      </div>
      <span>Version : Baobab Search v0.1</span>
    </footer>
  </main>

  <!-- RESULTATS -->
  <main id="results" class="page">
    <div class="results-header">
      <div class="logo-header" onclick="goHome()">BS</div>
      <form onsubmit="search(event)" class="search-small">
        <input id="searchInput2" type="text">
        <button>Q</button>
      </form>
    </div>
    <div class="filters">
      <button class="active">Tout</button><button>Images</button><button>Vidéos</button><button>Actualités</button><button>Documents</button>
    </div>
    <div id="resultsList" class="results"></div>
  </main>

  <!-- PARAMETRES -->
  <main id="settings" class="page">
    <h2>⚙️ Paramètres Baobab Search</h2>
    <div class="setting">
      <h3>Général</h3>
      <label>Langue : 
        <select>
          <option>Français</option>
          <option>English</option>
          <option>Wolof</option>
        </select>
      </label>
      <label>Mode : 
        <select onchange="setTheme(this.value)">
          <option value="light">Clair</option>
          <option value="dark">Sombre</option>
        </select>
      </label>
    </div>
    <button onclick="goHome()">Retour</button>
  </main>

<script src="script.js"></script>
</body>
        </html>
