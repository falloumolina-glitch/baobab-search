<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baobab Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="light">

  <!-- HEADER -->
  <header>
    <div class="logo-small" onclick="goHome()">BS</div>
    <button class="icon-btn" onclick="showPage('settings')">⚙️</button>
  </header>

  <!-- 1. ECRAN ACCUEIL -->
  <main id="home" class="page active">
    <div class="home-center">
      <div class="logo-big">BS</div>
      <h1>Baobab <span>Search</span></h1>
      
      <form onsubmit="search(event)" class="search-box">
        <span class="icon-loupe">🔍</span>
        <input id="searchInput" type="text" placeholder="Rechercher sur Baobab">
        <button type="submit" class="btn-q">Q</button>
      </form>

      <div class="shortcuts">
        <button onclick="quickSearch('actualités')">📰 Actualités</button>
        <button onclick="quickSearch('images')">🖼️ Images</button>
        <button onclick="quickSearch('vidéos')">▶️ Vidéos</button>
        <button onclick="quickSearch('baobab ai')">✨ Baobab AI</button>
      </div>
    </div>
  </main>

  <!-- 2. PAGE RESULTATS -->
  <main id="results" class="page">
    <div class="filters">
      <button onclick="filter('all')" class="active">Tout</button>
      <button onclick="filter('images')">Images</button>
      <button onclick="filter('videos')">Vidéos</button>
      <button onclick="filter('news')">Actualités</button>
      <button onclick="filter('docs')">Documents</button>
    </div>
    <div id="resultsList" class="results"></div>
  </main>

  <!-- 3. MENU PARAMETRES -->
  <main id="settings" class="page">
    <h2>Paramètres</h2>
    <div class="setting">
      <span>🌙 Mode sombre / clair</span>
      <button onclick="toggleTheme()">Changer</button>
    </div>
    <div class="setting"><span>🌍 Langue</span> <select><option>Français</option><option>English</option></select></div>
    <div class="setting"><span>🔒 Confidentialité</span></div>
    <div class="setting"><span>🕒 Historique de recherche</span> <button onclick="clearHistory()">Effacer</button></div>
    <div class="setting"><span>ℹ️ À propos de Baobab Search</span> <p>Version 0.1</p></div>
    <button class="back" onclick="goHome()">← Retour</button>
  </main>

  <script src="script.js"></script>
</body>
          </html>
