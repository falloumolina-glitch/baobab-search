<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baobab Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="logo">Baobab <span>Search</span></h1>
    
    <div class="search-bar">
      <!-- 1. LOUPE A GAUCHE MAINTENANT -->
      <button class="icon-btn primary" onclick="search()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- 2. INPUT AU MILIEU -->
      <input type="text" id="searchInput" placeholder="Recher sur Baobab..." onkeypress="handleKeyPress(event)">

      <!-- 3. MICRO ET PHOTO A DROITE -->
      <button class="icon-btn" onclick="startVoice()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 1C10.3431 1 9 2.34315 9 4V12C9 13.6569 10.3431 15 12 15C13.6569 15 15 13.6569 15 12V4C15 2.34315 13.6569 1 12 1Z" stroke="currentColor" stroke-width="2"/>
          <path d="M19 10V12C19 15.866 15.866 19 12 19M5 10V12C5 15.866 8.13401 19 12 19M12 19V23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <button class="icon-btn" onclick="startImageSearch()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z" stroke="currentColor" stroke-width="2"/>
          <path d="M9 22V12H15V22" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </div>

    <div class="tabs">
      <button class="tab active">Tout</button>
      <button class="tab">Images</button>
      <button class="tab">Vidéos</button>
      <button class="tab">Actualités</button>
    </div>

    <div class="history">
      <h3>Historique récent</h3>
      <div id="historyList"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
            </html>
