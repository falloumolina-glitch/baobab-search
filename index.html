<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baobab Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Sora:wght@700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
   .logo { font-family: 'Sora', sans-serif; }
   .bs-badge { background: linear-gradient(180deg, #10B981 33%, #FBBF24 33% 66%, #EF4444 66%); }
  </style>
</head>
<body class="bg-white min-h-screen flex-col justify-between">

  <!-- HEADER -->
  <header class="w-full flex justify-end p-4 text-sm">
    <a href="#" class="text-gray-600 hover:underline mr-6">Images</a>
    <a href="#" class="text-gray-600 hover:underline">Gmail</a>
  </header>

  <!-- MAIN -->
  <main class="flex-col items-center justify-center -mt-16 px-4">

    <!-- LOGO -->
    <h1 class="logo text-6xl md:text-7xl font-bold text-gray-900">Baobab</h1>
    <p class="text-gray-500 mt-1 mb-8 text-base">L'IA de la connaissance</p>

    <!-- BARRE DE RECHERCHE CORRIGEE -->
    <div class="w-[580px] max-w-[90%] h-14 bg-white border border-gray-200 rounded-full shadow-sm hover:shadow-md flex items-center px-5 transition-all">
      <!-- Badge BS -->
      <div class="bs-badge w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-xs mr-3">BS</div>

      <!-- Input -->
      <input type="text" placeholder="Recher sur Baobab..." class="w-full outline-none bg-transparent text-base">

      <!-- Loupe -->
      <button class="text-gray-400 hover:text-green-700">🔍</button>
    </div>

    <!-- BOUTONS CORRIGES -->
    <div class="mt-8 flex gap-3">
      <button class="bg-gray-100 hover:bg-gray-200 px-5 py-2 rounded text-sm font-medium transition">Baobab Search</button>
      <button class="bg-gray-100 hover:bg-gray-200 px-5 py-2 rounded text-sm font-medium transition">J'ai de la chance</button>
    </div>
  </main>

  <!-- FOOTER CORRIGE -->
  <footer class="w-full bg-gray-100 mt-auto">
    <div class="px-8 py-3 border-b border-gray-200 text-sm text-gray-600">Sénégal</div>
    <div class="px-8 py-3 flex-wrap gap-x-6 gap-y-2 text-sm text-gray-600">
      <a href="#" class="hover:underline">À propos</a>
      <a href="#" class="hover:underline">Publicité</a>
      <a href="#" class="hover:underline">Confidentialité</a>
      <a href="#" class="hover:underline">Conditions</a>
    </div>
  </footer>

</body>
  </html>
