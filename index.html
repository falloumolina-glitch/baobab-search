<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baobab IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">
  <header class="w-full h-16 flex items-center justify-end px-6">
    <a href="#" onclick="showPage('settingsPage')" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 text-sm mr-5" data-lang="settings">Paramètres</a>
    <div class="bs-badge w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-sm">BS</div>
  </header>

  <section id="homePage" class="page active min-h-[80vh] flex flex-col items-center justify-center px-4">
    <h1 class="font-sora text-6xl font-bold text-blue-600">Baobab</h1>
    <p class="text-gray-500 dark:text-gray-400 mt-2 mb-10" data-lang="subtitle">L'IA de la connaissance</p>
    <form onsubmit="search(event)" class="w-[580px] max-w-[95%] h-12 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-full shadow-md flex items-center px-4">
      <div class="bs-badge w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-xs mr-3">BS</div>
      <input id="searchInput" type="text" data-lang-placeholder="search_placeholder" placeholder="Demande à Baobab IA..." class="w-full outline-none bg-transparent">
      <button type="submit" class="text-blue-600">🔍</button>
    </form>
    <div class="mt-6 flex gap-3">
      <button onclick="search(event)" class="bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700 px-5 py-2 rounded-lg text-sm" data-lang="search_btn">Baobab Search</button>
      <button onclick="luckySearch()" class="bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700 px-5 py-2 rounded-lg text-sm" data-lang="lucky_btn">J'ai de la chance</button>
    </div>
    <footer class="absolute bottom-0 w-full bg-gray-100 dark:bg-gray-800">
      <div class="px-6 py-3 text-sm text-gray-600 dark:text-gray-400">Sénégal</div>
      <div class="px-6 py-3 flex gap-5 text-sm text-gray-600 dark:text-gray-400">
        <a href="#" onclick="showPage('privacyPage')" class="hover:underline" data-lang="privacy">Confidentialité</a>
        <a href="#" onclick="showPage('termsPage')" class="hover:underline" data-lang="terms">Conditions</a>
      </div>
    </footer>
  </section>

  <section id="resultsPage" class="page pt-4 pb-20 flex-col">
    <div class="w-full max-w-6xl mx-auto px-6">
      <form onsubmit="search(event)" class="w-full max-w-[650px] h-11 bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-700 rounded-full shadow-md flex items-center px-4">
        <div class="bs-badge w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-xs mr-3">BS</div>
        <input id="searchInput2" type="text" class="w-full outline-none bg-transparent">
        <button type="submit" class="text-blue-600">🔍</button>
      </form>
    </div>
    <div class="w-full max-w-6xl mx-auto px-6 mt-6">
      <div id="aiSummary" class="bg-blue-50 dark:bg-blue-900/20 border-l-4 border-blue-500 rounded-r-lg p-4 mb-4">
        <p class="text-sm font-semibold text-blue-800 dark:text-blue-300 mb-1" data-lang="ai_title">✨ Résumé IA</p>
        <p id="aiText" class="text-sm"></p>
      </div>
      <p id="resultCount" class="text-sm text-gray-500 mb-4"></p>
      <div id="resultsList" class="space-y-5"></div>
    </div>
  </section>

  <section id="settingsPage" class="page pt-20 max-w-xl mx-auto px-6 pb-20 flex-col">
    <h2 class="font-sora text-3xl font-bold mb-6" data-lang="settings_title">Paramètres</h2>
    <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-4 mb-4">
      <h3 class="font-semibold mb-3" data-lang="search_settings">Recherche</h3>
      <label class="flex items-center mt-2"><input type="checkbox" id="aiSummaryToggle" checked class="mr-2"><span data-lang="ai_summary">Afficher le résumé IA</span></label>
      <label class="flex items-center mt-2"><input type="checkbox" id="openNewTab" checked class="mr-2"><span data-lang="new_tab">Ouvrir dans un nouvel onglet</span></label>
    </div>
    <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-4 mb-4">
      <h3 class="font-semibold mb-3" data-lang="language">Langue</h3>
      <select id="language" onchange="changeLanguage(this.value)" class="w-full bg-gray-100 dark:bg-gray-800 border-none rounded-lg p-2">
        <option value="fr">Français</option>
        <option value="en">English</option>
        <option value="wo">Wolof</option>
      </select>
    </div>
    <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-4 mb-6">
      <h3 class="font-semibold mb-3" data-lang="appearance">Apparence</h3>
      <label class="flex items-center mt-2"><input type="radio" name="theme" value="light" checked class="mr-2"><span data-lang="light_theme">Thème Clair</span></label>
      <label class="flex items-center mt-2"><input type="radio" name="theme" value="dark" class="mr-2"><span data-lang="dark_theme">Thème Sombre</span></label>
    </div>
    <button onclick="saveSettings()" class="bg-blue-600 text-white px-6 py-3 rounded-full font-semibold hover:bg-blue-700" data-lang="save">Enregistrer</button>
    <p id="saveMsg" class="text-green-600 text-center mt-3 hidden" data-lang="saved">✓ Paramètres enregistrés!</p>
    <button onclick="showPage('homePage')" class="mt-4 text-blue-600 hover:underline" data-lang="back_home">← Retour</button>
  </section>

  <section id="termsPage" class="page pt-20 max-w-3xl mx-auto px-6 pb-20 flex-col"><h2 class="font-sora text-3xl font-bold mb-4">Conditions</h2><p>Licence MIT. Utilisation libre.</p><button onclick="showPage('homePage')" class="mt-6 bg-blue-600 text-white px-6 py-3 rounded-full">← Retour</button></section>
  <section id="privacyPage" class="page pt-20 max-w-3xl mx-auto px-6 pb-20 flex flex-col"><h2 class="font-sora text-3xl font-bold mb-4">Confidentialité</h2><p>Aucune donnée collectée. Stockage local uniquement.</p><button onclick="showPage('homePage')" class="mt-6 bg-blue-600 text-white px-6 py-3 rounded-full">← Retour</button></section>

  <script src="script.js"></script>
</body>
  </html>
